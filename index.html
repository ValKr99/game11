<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер: Документи від нотаріуса</title>
    <style>
        :root {
            --primary: #00a651; /* Корпоративний зелений */
            --secondary: #ffcd00; /* Корпоративний жовтий */
            --dark: #2c3e50;
            --bg: #f4f7f6;
            --white: #ffffff;
            --red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--white);
            width: 90%;
            max-width: 700px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .header {
            background: var(--primary);
            color: var(--white);
            padding: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .content {
            padding: 30px;
        }

        /* Елементи гри */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .timer {
            background: var(--secondary);
            color: var(--dark);
            padding: 8px 15px;
            border-radius: 10px;
            display: inline-block;
        }

        .document-card {
            background: #e8f5e9;
            border: 2px solid var(--primary);
            padding: 40px 20px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 20px 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--white);
            background: var(--primary);
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0,166,81,0.2);
        }

        .btn:hover {
            background: #008f45;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-start {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
        }

        .hidden {
            display: none !important;
        }

        .result-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .pass { color: var(--primary); }
        .fail { color: var(--red); }
    </style>
</head>
<body>

<div class="container" id="screen-start">
    <div class="header">
        <h1>Сортування документів</h1>
    </div>
    <div class="content">
        <h2>Перевірка знань</h2>
        <p>Ваше завдання — правильно розподілити документи, що отримуються від нотаріуса, на дві категорії: <b>Купівля-продаж</b> та <b>Іпотека</b>.</p>
        <p>⏱️ У вас є <b>4 хвилини</b>.<br>🎯 Прохідний бал: <b>80%</b>.</p>
        <button class="btn btn-start" onclick="startGame()">Почати тестування 🚀</button>
    </div>
</div>

<div class="container hidden" id="screen-game">
    <div class="header">
        <h1>Розподіліть документ</h1>
    </div>
    <div class="content">
        <div class="top-bar">
            <div id="progress">Питання 1 з 15</div>
            <div class="timer" id="timer">04:00</div>
        </div>
        
        <div class="document-card" id="document-text">
            </div>

        <div class="controls">
            <button class="btn" onclick="checkAnswer('kp')">📄 За договором<br>КУПІВЛІ-ПРОДАЖУ</button>
            <button class="btn" style="background: #2c3e50;" onclick="checkAnswer('ip')">🏠 За договором<br>ІПОТЕКИ</button>
        </div>
    </div>
</div>

<div class="container hidden" id="screen-result">
    <div class="header" id="result-header">
        <h1>Результат</h1>
    </div>
    <div class="content">
        <div id="result-icon" class="result-icon"></div>
        <h2 id="result-title"></h2>
        <p id="result-score" style="font-size: 1.2rem;"></p>
        <p id="result-message"></p>
        <button class="btn btn-start" onclick="location.reload()">Спробувати знову 🔄</button>
    </div>
</div>

<script>
    // База питань
    const allQuestions = [
        // Договір купівлі-продажу (kp)
        { text: "Довідка/витяг про відсутність зареєстрованих осіб у житловому приміщенні, що купується", type: "kp" },
        { text: "Довідка про місце реєстрації дитини Продавця з одним із батьків", type: "kp" },
        { text: "Нотаріально посвідчена згода другого з подружжя Продавця/Позичальника на укладення договору купівлі-продажу або нотаріально посвідчена заява про відсутність зареєстрованого шлюбу та спільного проживання", type: "kp" },
        { text: "Нотаріально засвідчена заява Продавця та його/її подружжя про відсутність прав і реєстрації малолітніх, неповнолітніх та недієздатних осіб щодо об’єкта нерухомості", type: "kp" },
        { text: "Договір купівлі-продажу нерухомого майна", type: "kp" },
        { text: "Витяг з Державного реєстру речових прав про реєстрацію права власності на Позичальника", type: "kp" },
        
        // Договір іпотеки (ip)
        { text: "Довідка про реєстрацію дитини Позичальника", type: "ip" },
        { text: "Витяг з Державного реєстру обтяжень майна", type: "ip" },
        { text: "Інформаційна довідка з держреєстрів щодо об’єкта нерухомості", type: "ip" },
        { text: "Інформаційна довідка з держреєстрів щодо наявних прав, іпотек та заборон відчуження нерухомості суб’єкта", type: "ip" },
        { text: "Нотаріальна згода подружжя на іпотеку або заява про відсутність шлюбу", type: "ip" },
        { text: "Нотаріальна заява про відсутність прав і реєстрації дітей та недієздатних осіб", type: "ip" },
        { text: "Іпотечний договір", type: "ip" },
        { text: "Витяг з Державного реєстру речових прав про реєстрацію іпотеки", type: "ip" },
        { text: "Заява про повний розрахунок між сторонами", type: "ip" }
    ];

    let questions = [];
    let currentQuestionIndex = 0;
    let correctAnswers = 0;
    let timerInterval;
    let timeLeft = 240; // 4 хвилини у секундах

    // Перемішування масиву (щоб питання щоразу були в різному порядку)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startGame() {
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        
        questions = shuffle([...allQuestions]);
        currentQuestionIndex = 0;
        correctAnswers = 0;
        timeLeft = 240;
        
        startTimer();
        showQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame(true); // true означає, що час вийшов
            }
        }, 1000);
    }

    function showQuestion() {
        if (currentQuestionIndex >= questions.length) {
            endGame(false);
            return;
        }
        
        document.getElementById('progress').innerText = `Документ ${currentQuestionIndex + 1} з ${questions.length}`;
        document.getElementById('document-text').innerText = questions[currentQuestionIndex].text;
    }

    function checkAnswer(selectedType) {
        if (questions[currentQuestionIndex].type === selectedType) {
            correctAnswers++;
        }
        
        currentQuestionIndex++;
        showQuestion();
    }

    function endGame(timeOut) {
        clearInterval(timerInterval);
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');

        let totalQuestions = questions.length;
        let percentage = Math.round((correctAnswers / totalQuestions) * 100);
        let isPassed = percentage >= 80;

        document.getElementById('result-score').innerHTML = `Правильних відповідей: <b>${correctAnswers} з ${totalQuestions}</b> (${percentage}%)`;

        if (timeOut) {
            document.getElementById('result-message').innerText = "⏱️ Час вичерпано!";
        }

        if (isPassed) {
            document.getElementById('result-icon').innerText = "🏆";
            document.getElementById('result-icon').className = "result-icon pass";
            document.getElementById('result-title').innerText = "Вітаємо! Ви склали тест.";
            document.getElementById('result-message').innerText = "Ви чудово знаєте перелік документів.";
            document.getElementById('result-header').style.background = "var(--primary)";
        } else {
            document.getElementById('result-icon').innerText = "📚";
            document.getElementById('result-icon').className = "result-icon fail";
            document.getElementById('result-title').innerText = "Тест не складено.";
            document.getElementById('result-message').innerText = "Для успішного проходження потрібно набрати мінімум 80%. Будь ласка, повторіть матеріал і спробуйте знову.";
            document.getElementById('result-header').style.background = "var(--red)";
        }
    }
</script>
</body>
</html>
